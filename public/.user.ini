; Limites de upload para anexos de documentos de lead.
; Mantido em sintonia com MAX_UPLOAD_BYTES (15 MB) do LeadDocumentController,
; com folga pra multipart overhead. Esse arquivo funciona em PHP-FPM/CGI
; (Hostinger usa LiteSpeed+PHP-FPM na maior parte dos planos), quando as
; diretivas php_value do .htaccess são ignoradas.

upload_max_filesize = 20M
post_max_size       = 25M
memory_limit        = 256M
max_execution_time  = 120
max_input_time      = 120
